<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNITED</title>
    <style>
        body { margin:0; padding:20px; background:#0a0a0a; color:#fff; font-family:system-ui; height:100vh; box-sizing:border-box; }
        h1 { color:#ff3333; text-align:center; margin:0 0 8px; }
        .status { padding:15px; background:rgba(255,51,51,0.15); border-radius:12px; text-align:center; margin:15px 0; min-height:50px; }
        button { width:100%; padding:18px; margin:8px 0; font-size:1.1rem; border:none; border-radius:12px; font-weight:bold; }
        .red-btn { background:#ff2222; }
        .listen-btn { background:#333; }
        .signature { position:fixed; bottom:12px; left:0; right:0; text-align:center; color:#444; font-size:0.75rem; }
    </style>
</head>
<body>
    <h1>UNITED</h1>
    <div class="status" id="status">Ready. Say ALERT or press the button</div>
    <button onclick="activateEmergency()" class="red-btn">EMERGENCY</button>
    <button onclick="startListening()" class="listen-btn">Start Listening for ALERT</button>
    <div class="signature">Built by Edward "The WOLF" Parkinson and Ara by Grok v1.01</div>

    <script>
        let isActive = false;

        function activateEmergency() {
            isActive = true;
            document.getElementById("status").innerHTML = "EMERGENCY MODE ACTIVATED<br>Recording discreetly...";
            startRecording();
            startCalmVoice();
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const recorder = new MediaRecorder(stream);
                recorder.start();
            } catch(e)        }

        function startCalmVoice() {
            const messages = [
                "Help is coming. You're not alone.",
                "Breathe slowly. Stay with me.",
                "You're doing great. Help is on the way."
            ];
            let i = 0;
            setInterval(() => {
                if (isActive) {
                    const utterance = new SpeechSynthesisUtterance(messages );
                    utterance.rate = 0.92;
                    speechSynthesis.speak(utterance);
                    i++;
                }
            }, 15000);
        }

        function startListening() {
            if (!('SpeechRecognition' in window)) {
                alert("Voice recognition not supported on this browser.");
                return;
            }
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = navigator.language || 'en-US';
            
            recognition.onresult = (event) => {
                const text = event.results[0].transcript.toLowerCase();
                document.getElementById("status").textContent = text;
                if (text.includes("alert")) {
                    activateEmergency();
                }
            };
            recognition.start();
        }

        window.onload = () => {
            document.getElementById("status").textContent = "Ready. Say ALERT or tap EMERGENCY";
        };
    </script>
</body>
</html>
